; freezer2 firmware — ESP32-C3 (Arduino + NimBLE).
; Phase 0 spike target. Phase 1 will add Adafruit_MAX31865 + RTClib to lib_deps.

[env:lolin_c3_mini]
platform = espressif32
board = lolin_c3_mini          ; ESP32-C3 SuperMini is compatible; use esp32-c3-devkitm-1 if needed
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions.csv
lib_deps =
	h2zero/NimBLE-Arduino@^2.2.0
build_flags =
	-DCORE_DEBUG_LEVEL=3
